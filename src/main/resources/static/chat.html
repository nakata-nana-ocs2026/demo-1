<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/chat.css">

    <title>チャット</title>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        チャット
    </div>

    <div id="chatMessages" 
        class="chat-messages">
    </div>

    <div class="chat-input">

        <input
            type="text"
            id="message"
            placeholder="メッセージを入力"
            oninput="checkInput()"
            onkeydown="handleEnter(event)"
        >

        <button
            type="button"
            id="sendButton"
            onclick="sendMessage(event)"
            disabled
        >
            送信
        </button>

    </div>

</div>

<input
    type="hidden"
    id="roomId"
    value="1"
>

<input
    type="hidden"
    id="teamId"
    value="1"
>

<input
    type="hidden"
    id="playerId"
    value="1"
>
</body>

</html>
